<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation</title>
    <script src="https://activity-icons.pluginrpc.projects.regdev.me/web/marked.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #c9d1d9;
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #0d1117;
        }
        #content {
            background: #161b22;
            padding: 40px;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        code {
            background-color: rgba(110,118,129,0.4);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 85%;
        }
        pre {
            background-color: #0d1117;
            padding: 16px;
            overflow: auto;
            border-radius: 6px;
            border: 1px solid #30363d;
        }
        blockquote {
            border-left: 4px solid #30363d;
            color: #8b949e;
            padding-left: 16px;
            margin: 0 0 16px 0;
        }
        h1, h2, h3 { 
            color: #f0f6fc;
            border-bottom: 1px solid #21262d; 
            padding-bottom: 0.3em; 
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        hr { height: 0.25em; padding: 0; margin: 24px 0; background-color: #30363d; border: 0; }
        ul, ol { padding-left: 2em; }
        li + li { margin-top: 0.25em; }
    </style>
</head>
<body>

    <div id="content">Loading...</div>

    <script>
        async function loadMarkdown() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');
            const contentDiv = document.getElementById('content');

            if (!fileName) {
                contentDiv.innerHTML = "<h1>Error</h1><p>No file specified. Use <code>?file=name.md</code></p>";
                return;
            }

            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error(`Status: ${response.status}`);

                const markdownText = await response.text();
                contentDiv.innerHTML = marked.parse(markdownText);
                
                const firstH1 = contentDiv.querySelector('h1');
                if (firstH1) document.title = firstH1.innerText;
            } catch (error) {
                contentDiv.innerHTML = `<h1>Error</h1><p>Failed to load document: ${error.message}</p>`;
            }
        }
        loadMarkdown();
    </script>
</body>
</html>
